# Geneso NFT (Docker на 127.0.0.1:18473 — см. nft-web/DEPLOY_SERVER.md).
#
# На VPS (путь к репо подставьте свой, например /opt/geneso/edem-backend):
#   sudo cp ops/nginx-geneso.edem.press.conf /etc/nginx/sites-available/geneso.edem.press
#   sudo ln -sf /etc/nginx/sites-available/geneso.edem.press /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# DNS: A-запись geneso.edem.press → IP сервера (тот же, что у edem.press).
#
# TLS (после того как DNS применился):
#   sudo certbot --nginx -d geneso.edem.press
# Certbot добавит ssl_certificate; до этого блок ниже отдаёт только HTTP :80.

upstream geneso_nft_upstream {
    server 127.0.0.1:18473;
    keepalive 8;
}

server {
    listen 80;
    listen [::]:80;
    server_name geneso.edem.press;

    location / {
        proxy_pass http://geneso_nft_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 75s;
        proxy_send_timeout 75s;
        proxy_read_timeout 75s;
    }
}
