# TLS: один сертификат с SAN (edem.press + staging.edem.press) после: certbot certonly --nginx --cert-name edem.press --expand -d edem.press -d www.edem.press -d app.edem.press -d staging.edem.press

server {
    listen 80;
    listen [::]:80;
    server_name staging.edem.press;
    return 301 https://staging.edem.press$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name staging.edem.press;

    client_max_body_size 20m;

    ssl_certificate /etc/letsencrypt/live/edem.press/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/edem.press/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location /api/auth/ {
        limit_req zone=edem_api_auth burst=45 nodelay;
        proxy_pass http://127.0.0.1:3001/api/auth/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 75s;
        proxy_send_timeout 75s;
        proxy_read_timeout 75s;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:3001/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 75s;
        proxy_send_timeout 75s;
        proxy_read_timeout 75s;
    }

    location / {
        proxy_pass http://127.0.0.1:8081/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 75s;
        proxy_send_timeout 75s;
        proxy_read_timeout 75s;
    }
}
