# Полный виртуальный хост staging (дублирует хвост edem.press.nginx).
# После DNS и certbot подключите тот же файл, что и основной сайт, или скопируйте блоки в sites-enabled.

# Ссылка: https://staging.edem.press
# TLS по умолчанию: /etc/letsencrypt/live/staging.edem.press/ (certbot certonly --nginx -d staging.edem.press)
# Если SAN на основном сертификате edem.press — замените пути ssl_certificate* на live/edem.press

server {
    listen 80;
    listen [::]:80;
    server_name staging.edem.press;
    return 301 https://staging.edem.press$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name staging.edem.press;

    client_max_body_size 20m;

    ssl_certificate /etc/letsencrypt/live/staging.edem.press/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/staging.edem.press/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location /api/auth/ {
        proxy_pass http://127.0.0.1:3001/api/auth/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 75s;
        proxy_send_timeout 75s;
        proxy_read_timeout 75s;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:3001/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 75s;
        proxy_send_timeout 75s;
        proxy_read_timeout 75s;
    }

    location / {
        proxy_pass http://127.0.0.1:8081/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 75s;
        proxy_send_timeout 75s;
        proxy_read_timeout 75s;
    }
}
