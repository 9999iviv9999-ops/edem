# Подключи ОДИН РАЗ внутри блока http { } основного nginx (до include sites-enabled/*):
#
#   include /полный/путь/к/репозиторию/ops/nginx-http-snippet-edem.conf;
#
# Затем в edem.press.nginx раскомментируй limit_req в location /api/auth/
# и выполни: nginx -t && systemctl reload nginx
#
# ~24 запроса/мин с одного IP на /api/auth/* (логин, регистрация, refresh) + burst.

limit_req_zone $binary_remote_addr zone=edem_api_auth:10m rate=24r/m;
