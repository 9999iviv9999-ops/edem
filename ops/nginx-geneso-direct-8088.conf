# Прямой доступ к Geneso (Docker :18473) без Host geneso.edem.press.
# Нужен, если открывают сайт по IP или Tor не резолвит поддомен — на :80 у этого IP
# висит другой vhost (например nftbox).
#
#   sudo cp ops/nginx-geneso-direct-8088.conf /etc/nginx/sites-available/geneso-direct-8088
#   sudo ln -sf /etc/nginx/sites-available/geneso-direct-8088 /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo ufw allow 8088/tcp

server {
    listen 8088;
    listen [::]:8088;
    server_name _;

    location / {
        proxy_pass http://127.0.0.1:18473;
        proxy_http_version 1.1;
        proxy_set_header Host geneso.edem.press;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 75s;
        proxy_send_timeout 75s;
        proxy_read_timeout 75s;
    }
}
