# Render Blueprint: https://render.com/docs/blueprint-spec
# Подключи репозиторий в Render → New → Blueprint → указать этот файл.
# После деплоя задай вручную в панели API: JWT_SECRET, ADMIN_MODERATION_KEY, VPROK_* (см. .env.example).

databases:
  - name: vprok-postgres
    databaseName: vprok
    user: vprok
    plan: free

services:
  - type: web
    name: vprok-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: vprok-postgres
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_MODERATION_KEY
        generateValue: true
      - key: VPROK_WEBHOOK_SECRET
        generateValue: true
      - key: VPROK_PAYMENT_PROVIDER
        value: mock
      - key: VPROK_PLATFORM_FEE_BPS
        value: "300"
      - key: PORT
        value: "3000"
