services:
  db:
    image: postgres:16
    container_name: edem-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: edem
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - edem_pg_data:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: edem-api
    restart: unless-stopped
    depends_on:
      - db
    env_file:
      - .env
    ports:
      - "3000:3000"

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:3000
    container_name: edem-web
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "8080:80"

  pgadmin:
    image: dpage/pgadmin4:8
    container_name: edem-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@edem.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - db

volumes:
  edem_pg_data:
