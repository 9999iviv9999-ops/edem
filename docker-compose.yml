services:
  db:
    image: postgres:16
    container_name: vprok-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: vprok
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - vprok_pg_data:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vprok-api
    restart: unless-stopped
    depends_on:
      - db
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/vprok?schema=public
    ports:
      - "3000:3000"

  web:
    build:
      context: ./edem-web
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://89.108.66.253:3000
    container_name: vprok-web
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "8080:80"

  pgadmin:
    image: dpage/pgadmin4:8
    container_name: vprok-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@vprok.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - db

volumes:
  vprok_pg_data:
