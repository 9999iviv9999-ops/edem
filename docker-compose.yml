services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: edem-api
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - ./uploads:/app/uploads
    networks:
      - default
      - legacy_db

  web:
    build:
      context: ./edem-web
      dockerfile: Dockerfile
    container_name: edem-web
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "127.0.0.1:8080:80"
    networks:
      - default

networks:
  legacy_db:
    external: true
    name: edem-backend_default
