server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  location /uploads/ {
    proxy_pass http://api:3000/uploads/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Не кэшировать SPA-оболочку: иначе на телефоне остаётся старый index.html и роут /privacy «съезжает» в логин.
  location = /index.html {
    add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate" always;
    add_header Pragma "no-cache" always;
    expires -1;
  }

  # Имя файла в /assets/ иногда не меняется между сборками — без заголовка Opera/Chrome держат старый CSS/JS.
  location ~* ^/assets/.*\.(css|js)$ {
    add_header Cache-Control "no-cache, must-revalidate" always;
    try_files $uri =404;
  }

  # Статику с расширением кэшируем; всё остальное (в т.ч. /messages → index.html) — без кэша, иначе
  # браузер держит старый HTML по URL /messages и не подхватывает новые ссылки на /assets/*.css.
  location ~* ^/.+\.(?:png|jpg|jpeg|gif|webp|ico|svg|woff2?|webmanifest)$ {
    expires 7d;
    add_header Cache-Control "public, max-age=604800" always;
    try_files $uri =404;
  }

  location / {
    add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate" always;
    add_header Pragma "no-cache" always;
    expires -1;
    try_files $uri $uri/ /index.html;
  }
}
